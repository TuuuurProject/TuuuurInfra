name: Terraform Plan (PR)

on:
  pull_request:
    branches:
      - release
      - master
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/**"

jobs:
  detect-environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed environments
        id: detect
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          ENVS="[]"

          # Check each environment
          if echo "$CHANGED_FILES" | grep -q "environments/preprod\|modules/"; then
            ENVS=$(echo $ENVS | jq -c '. + ["preprod"]')
          fi

          if echo "$CHANGED_FILES" | grep -q "environments/prod\|modules/"; then
            ENVS=$(echo $ENVS | jq -c '. + ["prod"]')
          fi

          if echo "$CHANGED_FILES" | grep -q "environments/dev\|modules/"; then
            ENVS=$(echo $ENVS | jq -c '. + ["dev"]')
          fi

          echo "environments=$ENVS" >> $GITHUB_OUTPUT
          echo "Detected environments: $ENVS"

  terraform-plan:
    needs: detect-environments
    if: needs.detect-environments.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-environments.outputs.environments) }}

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: ${{ secrets[format('TF_VAR_PROJECT_ID_{0}', matrix.environment == 'preprod' && 'PREPROD' || matrix.environment == 'prod' && 'PROD' || 'DEV')] }}
        run: |
          terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan for \`${{ matrix.environment }}\` 📝

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
