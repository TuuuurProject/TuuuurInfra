name: CD - Deploy Production

on:
  push:
    branches:
      - master
    paths:
      - "environments/prod/**"
      - "modules/**"
      - ".github/workflows/cd-prod.yml"
      - ".github/workflows/terraform-apply.yml"

  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm deployment'
        required: true
        default: "no"

jobs:
  check-confirmation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "Production deployment not confirmed. Exiting."
            exit 1
          fi

  terraform-apply:
    needs: [check-confirmation]
    if: |
      always() && 
      (github.event_name == 'push' || 
       (github.event_name == 'workflow_dispatch' && needs.check-confirmation.result == 'success'))
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: "prod"
      project_id: "tuuuur"
      env_name: "prod"
      terraform_version: "1.13.0"
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
