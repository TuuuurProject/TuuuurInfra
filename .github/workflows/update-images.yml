name: Update Terraform Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to update (preprod or prod)"
        required: true
        type: choice
        options:
          - preprod
          - prod
      front_image:
        description: "Front Docker image (optional, leave empty to keep current)"
        required: false
      api_image:
        description: "API Docker image (optional, leave empty to keep current)"
        required: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update secrets in GCP Secret Manager
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          FRONT_IMAGE: ${{ inputs.front_image }}
          API_IMAGE: ${{ inputs.api_image }}
        run: |
          PROJECT_ID="tuuuur"

          if [ -n "$FRONT_IMAGE" ]; then
            echo "Updating front-image secret in GCP Secret Manager"
            echo -n "$FRONT_IMAGE" | gcloud secrets versions add "webplat-${ENVIRONMENT}-front-image" \
              --project="$PROJECT_ID" \
              --data-file=-
            echo "✅ front-image updated"
          fi

          if [ -n "$API_IMAGE" ]; then
            echo "Updating api-image secret in GCP Secret Manager"
            echo -n "$API_IMAGE" | gcloud secrets versions add "webplat-${ENVIRONMENT}-api-image" \
              --project="$PROJECT_ID" \
              --data-file=-
            echo "✅ api-image updated"
          fi

      - name: Trigger Terraform deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "preprod" ]; then
            gh workflow run cd-preprod.yml
          else
            gh workflow run cd-prod.yml
          fi

          echo "Deployment workflow triggered for $ENVIRONMENT"
